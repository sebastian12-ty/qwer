services:
  - type: web
    name: edusatisface
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --workers 2 --threads 4 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DB_PATH
        value: /var/data/edusatisface.db
    disk:
      name: edusatisface-data
      mountPath: /var/data
      sizeGB: 1
